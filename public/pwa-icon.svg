<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <!-- Squircle background. Stays inside maskable safe zone (~10%). -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Centered 学 (study/learn). -->
  <text
    x="256"
    y="356"
    font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', system-ui, sans-serif"
    font-size="320"
    font-weight="700"
    text-anchor="middle"
    fill="#fafafa"
    style="paint-order: stroke; letter-spacing: 0;"
  >学</text>
  <!-- Subtle 'N' mark in the corner. -->
  <text
    x="416"
    y="448"
    font-family="Inter, system-ui, sans-serif"
    font-size="40"
    font-weight="600"
    text-anchor="middle"
    fill="#fafafa"
    fill-opacity="0.3"
  >N</text>
</svg>
